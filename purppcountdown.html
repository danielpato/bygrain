<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANÇA PA TE DAR BOLO</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            /* Fixed top padding for consistency */
            padding-top: 60px; 
        }

        .stretched-text {
            font-weight: 900;
            display: inline-block;
            transform: scaleY(2.5);
            line-height: 1;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* Reduced the MAX values (3rd number) 
           to force it to stay smaller on desktop.
        */

        .header-text {
            font-size: clamp(18px, 4vw, 28px);
            margin-bottom: clamp(40px, 6vw, 60px); 
        }

        .date-text {
            font-size: clamp(10px, 2vw, 14px);
            margin-bottom: clamp(60px, 10vw, 80px);
        }

        #countdown {
            font-size: clamp(32px, 8vw, 90px);
            margin-bottom: clamp(80px, 12vw, 110px);
        }

        .footer-text {
            font-size: clamp(14px, 3vw, 22px);
            margin-bottom: clamp(60px, 8vw, 80px);
        }

        .promo-image {
            /* Image is now capped at 450px for a more balanced look */
            width: clamp(250px, 70vw, 450px); 
            height: auto;
            display: block;
            margin-bottom: 100px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="stretched-text header-text">DANÇA PA TE DAR BOLO</div>
        <div class="stretched-text date-text">Março 27</div>
        
        <div id="countdown" class="stretched-text">00D 00H 00M 00S</div>
        
        <div class="stretched-text footer-text">SIPPINPURPP x YURI NR5</div>

        <img src="/images/dancatshirt.png" alt="DANÇA T-Shirt" class="promo-image">
    </div>

    <script>
        const countDownDate = new Date("March 27, 2026 00:00:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;
            const days = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            const seconds = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');

            document.getElementById("countdown").innerHTML = `${days}D ${hours}H ${minutes}M ${seconds}S`;
            if (distance < 0) document.getElementById("countdown").innerHTML = "OUT NOW";
        }, 1000);
    </script>

</body>
</html>
