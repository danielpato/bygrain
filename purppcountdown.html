<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            font-family: 'Arial Black', sans-serif; /* Thicker font works better for stretching */
            overflow: hidden;
        }

        #countdown {
            text-align: center;
            font-size: 8vw; /* Responsive size based on screen width */
            font-weight: 900;
            letter-spacing: -2px;
            
            /* The Magic: ScaleY(2) makes it twice as tall */
            transform: scaleY(2); 
            display: inline-block;
            
            /* Adjusting line-height prevents the stretched text from overlapping other elements */
            line-height: 1;
        }
    </style>
</head>
<body>

    <div id="countdown">00d 00h 00m 00s</div>

    <script>
        const countDownDate = new Date("March 27, 2026 00:00:00").getTime();

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("countdown").innerHTML = 
                days + "D " + hours + "H " + minutes + "M " + seconds + "S";

            if (distance < 0) {
                clearInterval(x);
                document.getElementById("countdown").innerHTML = "NOW";
            }
        }, 1000);
    </script>

</body>
</html>
