<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANÇA PA TE DAR BOLO</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
            /* This allows the absolute items to be relative to the screen */
            position: relative; 
        }

        /* Common style for all centered items */
        .centered-item {
            position: absolute;
            left: 50%;
            transform: translateX(-50%); /* Centers horizontally */
            text-align: center;
            width: 100%;
        }

        .stretched-text {
            font-weight: 900;
            display: inline-block;
            transform: translateX(-50%) scaleY(2.5); /* Centers AND stretches */
            line-height: 1;
            letter-spacing: 2px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* --- ADJUST POSITIONS HERE --- */

        .header-text {
            top: 10%; /* 10% from the top */
            font-size: 25px;
        }

        .date-text {
            top: 18%; /* 18% from the top */
            font-size: 15px;
        }

        #countdown {
            top: 35%; /* 35% from the top */
            font-size: 10vw; /* Scales with width */
        }

        .footer-text {
            top: 55%; /* 55% from the top */
            font-size: 20px;
        }

        .promo-image {
            top: 65%; /* 65% from the top */
            width: 500px;
            max-width: 80%;
            height: auto;
        }

        /* Mobile specific font-size fix */
        @media (max-width: 600px) {
            #countdown { font-size: 40px; }
            .header-text { font-size: 18px; }
            /* You can even change the % positions specifically for mobile here if needed */
        }
    </style>
</head>
<body>

    <div class="centered-item stretched-text header-text">DANÇA PA TE DAR BOLO</div>
    <div class="centered-item stretched-text date-text">Março 27</div>
    
    <div id="countdown" class="centered-item stretched-text">00D 00H 00M 00S</div>
    
    <div class="centered-item stretched-text footer-text">SIPPINPURPP x YURI NR5</div>

    <img src="/media/dancatshirt.png" alt="DANÇA T-Shirt" class="centered-item promo-image">

    <script>
        const countDownDate = new Date("March 27, 2026 00:00:00").getTime();
        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const d = days.toString().padStart(2, '0');
            const h = hours.toString().padStart(2, '0');
            const m = minutes.toString().padStart(2, '0');
            const s = seconds.toString().padStart(2, '0');

            document.getElementById("countdown").innerHTML = d + "D " + h + "H " + m + "M " + s + "S";

            if (distance < 0) {
                clearInterval(x);
                document.getElementById("countdown").innerHTML = "OUT NOW";
            }
        }, 1000);
    </script>

</body>
</html>
