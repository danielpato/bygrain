<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANÇA PA TE DAR BOLO</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding-top: 20px; 
        }

        .stretched-text {
            font-weight: 900;
            display: inline-block;
            transform: scaleY(2.5);
            line-height: 1;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* Top Logo */
        .top-logo {
            width: clamp(150px, 30vw, 250px);
            height: auto;
            margin-bottom: 40px;
        }

        .header-text {
            font-size: clamp(18px, 4vw, 28px);
            margin-bottom: clamp(20px, 3vw, 30px); 
        }

        .date-text {
            font-size: clamp(10px, 2vw, 14px);
            /* Margin increased to prevent overlap from the tall countdown */
            margin-bottom: clamp(50px, 8vw, 70px); 
        }

        #countdown {
            font-size: clamp(32px, 8vw, 90px);
            margin-bottom: clamp(40px, 6vw, 55px);
        }

        .promo-image {
            width: clamp(250px, 70vw, 450px); 
            height: auto;
            display: block;
            margin-bottom: 50px; 
        }

        .footer-text {
            /* 50% smaller than headers */
            font-size: clamp(8px, 1.5vw, 12px); 
            margin-bottom: 60px; /* Final padding at bottom of page */
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="/images/purppworld.png" alt="Purpp World" class="top-logo">

        <div class="stretched-text header-text">DANÇA PA TE DAR BOLO</div>
        <div class="stretched-text date-text">Março 27</div>
        
        <div id="countdown" class="stretched-text">00D 00H 00M 00S</div>
        
        <img src="/images/dancatshirt.png" alt="DANÇA T-Shirt" class="promo-image">

        <div class="stretched-text footer-text">ANDA LÁ</div>
    </div>

    <script>
        const countDownDate = new Date("March 27, 2026 00:00:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;
            
            const days = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            const seconds = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');

            document.getElementById("countdown").innerHTML = `${days}D ${hours}H ${minutes}M ${seconds}S`;
            
            if (distance < 0) {
                document.getElementById("countdown").innerHTML = "OUT NOW";
            }
        }, 1000);
    </script>

</body>
</html>
