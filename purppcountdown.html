<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANÇA PA TE DAR BOLO</title>
    <style>
        /* Black background and top-aligned layout */
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center; /* Center horizontally */
            align-items: flex-start; /* Align to the top */
            color: #ffffff;
            font-family: Arial, sans-serif;
            /* Allow scrolling if the image is tall */
            overflow-y: auto; 
        }

        /* Container to stack the elements vertically with top padding */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding-top: 10vh; /* Space from the very top of the browser */
            width: 100%;
        }

        /* Styling for all text elements */
        .stretched-text {
            font-weight: 900;
            display: inline-block;
            transform: scaleY(2.5); /* Vertical stretch */
            line-height: 1;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Top text */
        .header-text {
            font-size: 2.5vw;
            margin-bottom: 8vh; 
        }

        /* Countdown */
        #countdown {
            font-size: 10vw;
            margin-bottom: 8vh;
            margin-top: 8vh;
        }

        /* Footer text */
        .footer-text {
            font-size: 2vw;
            margin-top: 8vh;
            margin-bottom: 10vh; /* Space before the image */
        }

        /* The Image */
        .promo-image {
            max-width: 80%; /* Limits width so it doesn't hit edges */
            height: auto;
            display: block;
            margin: 0 auto 50px auto; /* Centered with bottom margin */
        }

        /* Desktop caps for font sizes */
        @media (min-width: 1200px) {
            .header-text { font-size: 30px; }
            #countdown { font-size: 130px; }
            .footer-text { font-size: 25px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="stretched-text header-text">DANÇA PA TE DAR BOLO</div>
        
        <div id="countdown" class="stretched-text">00D 00H 00M 00S</div>
        
        <div class="stretched-text footer-text">SIPPINPURPP x YURI NR5</div>

        <img src="/images/dancatshirt.png" alt="DANÇA T-Shirt" class="promo-image">
    </div>

    <script>
        const countDownDate = new Date("March 27, 2026 00:00:00").getTime();

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const d = days.toString().padStart(2, '0');
            const h = hours.toString().padStart(2, '0');
            const m = minutes.toString().padStart(2, '0');
            const s = seconds.toString().padStart(2, '0');

            document.getElementById("countdown").innerHTML = 
                d + "D " + h + "H " + m + "M " + s + "S";

            if (distance < 0) {
                clearInterval(x);
                document.getElementById("countdown").innerHTML = "OUT NOW";
            }
        }, 1000);
    </script>

</body>
</html>
