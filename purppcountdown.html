<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANÇA PA TE DAR BOLO</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            /* Padding at the top relative to screen width */
            padding-top: 10vw; 
        }

        .stretched-text {
            font-weight: 900;
            display: inline-block;
            transform: scaleY(2.5);
            line-height: 1;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* Using vw for margins makes them scale based on the NARROWNESS of the screen */
        .header-text {
            font-size: 4vw;
            margin-bottom: 6vw; 
        }

        .date-text {
            font-size: 2vw;
            margin-bottom: 10vw;
        }

        #countdown {
            font-size: 10vw;
            margin-bottom: 12vw;
        }

        .footer-text {
            font-size: 3vw;
            margin-bottom: 8vw;
        }

        .promo-image {
            width: 70vw; /* Image size scales perfectly with text */
            max-width: 600px;
            height: auto;
            margin-bottom: 10vw;
        }

        /* Desktop Cap: Prevents things from getting comically large on ultra-wide monitors */
        @media (min-width: 1200px) {
            .header-text { font-size: 40px; margin-bottom: 50px; }
            .date-text { font-size: 20px; margin-bottom: 80px; }
            #countdown { font-size: 110px; margin-bottom: 100px; }
            .footer-text { font-size: 28px; margin-bottom: 70px; }
            .container { padding-top: 60px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="stretched-text header-text">DANÇA PA TE DAR BOLO</div>
        <div class="stretched-text date-text">Março 27</div>
        
        <div id="countdown" class="stretched-text">00D 00H 00M 00S</div>
        
        <div class="stretched-text footer-text">SIPPINPURPP x YURI NR5</div>

        <img src="/media/dancatshirt.png" alt="DANÇA T-Shirt" class="promo-image">
    </div>

    <script>
        const countDownDate = new Date("March 27, 2026 00:00:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;
            const days = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            const seconds = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');

            document.getElementById("countdown").innerHTML = `${days}D ${hours}H ${minutes}M ${seconds}S`;
            if (distance < 0) document.getElementById("countdown").innerHTML = "OUT NOW";
        }, 1000);
    </script>

</body>
</html>
