<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown to March 27</title>
    <style>
        /* Reset and layout */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000000; /* All black background */
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff; /* White text */
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        #countdown {
            text-align: center;
            font-size: 4rem;
            font-weight: bold;
        }

        .label {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
            display: block;
            color: #888; /* Slight grey for the labels to keep focus on numbers */
        }
    </style>
</head>
<body>

    <div id="countdown">Loading...</div>

    <script>
        // Set the date we're counting down to
        const countDownDate = new Date("March 27, 2026 00:00:00").getTime();

        // Update the count down every 1 second
        const x = setInterval(function() {

            // Get today's date and time
            const now = new Date().getTime();

            // Find the distance between now and the count down date
            const distance = countDownDate - now;

            // Time calculations for days, hours, minutes and seconds
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Display the result in the element with id="countdown"
            document.getElementById("countdown").innerHTML = 
                days + "d " + hours + "h " + minutes + "m " + seconds + "s";

            // If the count down is finished, write some text
            if (distance < 0) {
                clearInterval(x);
                document.getElementById("countdown").innerHTML = "THE DAY HAS ARRIVED";
            }
        }, 1000);
    </script>

</body>
</html>
