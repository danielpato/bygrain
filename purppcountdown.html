<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANÇA PA TE DAR BOLO</title>
    <style>
        /* Black background and top-aligned layout */
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center; 
            align-items: flex-start; 
            color: #ffffff;
            font-family: Arial, sans-serif;
            overflow-y: auto; 
        }

        /* Container with fixed top padding */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding-top: 80px; /* Fixed space from top */
            width: 100%;
        }

        /* Base styling for stretched text */
        .stretched-text {
            font-weight: 900;
            display: inline-block;
            transform: scaleY(2.5); 
            line-height: 1;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Top text - Fixed sizes */
        .header-text {
            font-size: 32px;
            margin-bottom: 70px; /* Account for vertical stretch */
        }

        /* Date text - Fixed sizes */
        .date-text {
            font-size: 18px;
            margin-bottom: 80px;
        }

        /* Countdown - Fixed sizes */
        #countdown {
            font-size: 80px;
            margin-bottom: 100px;
        }

        /* Footer text - Fixed sizes */
        .footer-text {
            font-size: 24px;
            margin-bottom: 80px; 
        }

        /* Image styling */
        .promo-image {
            width: 600px; /* Fixed width */
            max-width: 90%; /* Prevents image from overflowing on mobile */
            height: auto;
            display: block;
            margin: 0 auto 100px auto; 
        }

        /* Tablet/Mobile Optimization */
        /* Even with fixed pixels, we shrink the font slightly for small screens so it doesn't wrap */
        @media (max-width: 600px) {
            #countdown { font-size: 45px; }
            .header-text { font-size: 22px; }
            .promo-image { width: 300px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="stretched-text header-text">DANÇA PA TE DAR BOLO</div>
        <div class="stretched-text date-text">Março 27</div>
        
        <div id="countdown" class="stretched-text">00D 00H 00M 00S</div>
        
        <div class="stretched-text footer-text">SIPPINPURPP x YURI NR5</div>

        <img src="/media/dancatshirt.png" alt="DANÇA T-Shirt" class="promo-image">
    </div>

    <script>
        const countDownDate = new Date("March 27, 2026 00:00:00").getTime();

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const d = days.toString().padStart(2, '0');
            const h = hours.toString().padStart(2, '0');
            const m = minutes.toString().padStart(2, '0');
            const s = seconds.toString().padStart(2, '0');

            document.getElementById("countdown").innerHTML = 
                d + "D " + h + "H " + m + "M " + s + "S";

            if (distance < 0) {
                clearInterval(x);
                document.getElementById("countdown").innerHTML = "OUT NOW";
            }
        }, 1000);
    </script>

</body>
</html>
