<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANÇA PA TE DAR BOLO</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            /* Caps the top padding at 80px max */
            padding-top: clamp(40px, 10vw, 80px); 
        }

        .stretched-text {
            font-weight: 900;
            display: inline-block;
            transform: scaleY(2.5);
            line-height: 1;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* CLAMP EXPLAINED:
           clamp(MIN_PIXELS, PREFERRED_VW, MAX_PIXELS)
        */

        .header-text {
            font-size: clamp(20px, 4vw, 40px);
            margin-bottom: clamp(30px, 6vw, 60px); 
        }

        .date-text {
            font-size: clamp(12px, 2vw, 20px);
            margin-bottom: clamp(40px, 10vw, 80px);
        }

        #countdown {
            /* On mobile it's 10% width, but never gets bigger than 140px */
            font-size: clamp(35px, 10vw, 140px);
            margin-bottom: clamp(50px, 12vw, 110px);
        }

        .footer-text {
            font-size: clamp(16px, 3vw, 30px);
            margin-bottom: clamp(40px, 8vw, 70px);
        }

        .promo-image {
            /* Image grows with screen but stops at 600px wide */
            width: clamp(280px, 70vw, 600px); 
            height: auto;
            display: block;
            margin-bottom: 100px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="stretched-text header-text">DANÇA PA TE DAR BOLO</div>
        <div class="stretched-text date-text">Março 27</div>
        
        <div id="countdown" class="stretched-text">00D 00H 00M 00S</div>
        
        <div class="stretched-text footer-text">SIPPINPURPP x YURI NR5</div>

        <img src="/images/dancatshirt.png" alt="DANÇA T-Shirt" class="promo-image">
    </div>

    <script>
        const countDownDate = new Date("March 27, 2026 00:00:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;
            const days = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            const seconds = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');

            document.getElementById("countdown").innerHTML = `${days}D ${hours}H ${minutes}M ${seconds}S`;
            if (distance < 0) document.getElementById("countdown").innerHTML = "OUT NOW";
        }, 1000);
    </script>

</body>
</html>
