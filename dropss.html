<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vertical GIF Stack</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #222;
    }

    .container {
      width: 500px;
      height: 300px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .container a {
      flex: 1;
    }

    .container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>

  <div class="container">
    <a href="https://example.com/1" target="_blank">
      <img src="https://media.giphy.com/media/ICOgUNjpvO0PC/giphy.gif" alt="GIF 1">
    </a>
    <a href="https://example.com/2" target="_blank">
      <img src="https://media.giphy.com/media/3o7aD2saalBwwftBIY/giphy.gif" alt="GIF 2">
    </a>
    <a href="https://example.com/3" target="_blank">
      <img src="https://media.giphy.com/media/l0HlQ7LRalQqdWfao/giphy.gif" alt="GIF 3">
    </a>
  </div>

</body>
</html>
