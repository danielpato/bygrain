    /* Theme variables for scrollbar (matches index.html) */
    :root {
      --button-face: #dfdfdf;
      --button-highlight: #ffffff;
      --button-shadow: #808080;
      --window-frame: #0a0a0a;
      --border-raised-outer: inset -1px -1px var(--window-frame), inset 1px 1px var(--button-highlight);
      --border-raised-inner: inset -2px -2px var(--button-shadow), inset 2px 2px var(--button-face);
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #222;
    }
    body {
      display: flex;
      justify-content: center;
    }

    /* Stylized scrollbar (same as index – Win98 theme) */
    ::-webkit-scrollbar {
      width: 16px;
    }
    ::-webkit-scrollbar:horizontal {
      height: 17px;
    }
    ::-webkit-scrollbar-corner {
      background: var(--button-face);
    }

    .container {
      width: 100%;
      max-width: 800px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-auto-rows: auto;
      gap: 0;
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    /* Square cells, video fills and crops (cover) */
    .video-box {
      position: relative;
      width: 100%;
      height: 0;
      padding-bottom: 100%;
      overflow: hidden;
      box-sizing: border-box;
    }

    .video-box video {
      position: absolute;
      top: 0;
      left: 0;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-box a {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      display: block;
    }
