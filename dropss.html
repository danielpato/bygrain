      max-width: 800px;
      aspect-ratio: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 0;
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    .video-box {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 0;
      overflow: hidden;
      box-sizing: border-box;
    }

    .video-box video {
      position: absolute;
      top: 0;
      left: 0;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-box a {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
