<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            /* Sets the background color */
            background-color: #001ced;
            /* Removes default browser margins so the image touches the edges */
            margin: 0;
            padding: 0;
        }

        .top-image {
            /* Makes the image match the window width */
            width: 100%;
            /* Ensures the image maintains its aspect ratio */
            height: auto;
            /* Removes any tiny gaps at the bottom of the image */
            display: block;
        }
    </style>
    <title>loading...</title>
</head>
<body>

    <img src="/images/loading.gif" alt="Loading" class="top-image">

</body>
</html>
