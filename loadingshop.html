<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #001ced;
            margin: 0;
            padding: 0;
        }

        /* The link wrapper */
        .image-link {
            display: block;
            text-decoration: none; /* Removes underline if any text slips in */
        }

        .top-image {
            width: 100%;
            max-width: 800px;
            height: auto;
            display: block;
            margin: 0 auto;
            border: none; /* Ensures no border appears on some older browsers */
        }
    </style>
    <title>loading...</title>
</head>
<body>

    <a href="https://bygrain.com" class="image-link">
        <img src="/images/loading.gif" alt="Loading" class="top-image">
    </a>

</body>
</html>
