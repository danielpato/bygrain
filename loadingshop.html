<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            /* Sets the background color */
            background-color: #001ced;
            /* Removes default browser margins */
            margin: 0;
            padding: 0;
        }

        .top-image {
            /* Allows the image to scale down on small screens */
            width: 100%;
            /* Prevents the image from growing larger than 800px */
            max-width: 800px;
            /* Ensures the image maintains its aspect ratio */
            height: auto;
            /* Removes gaps and allows for centering with margin */
            display: block;
            /* Centers the image horizontally once it hits the max-width */
            margin: 0 auto;
        }
    </style>
    <title>loading...</title>
</head>
<body>

    <img src="/images/loading.gif" alt="Loading" class="top-image">

</body>
</html>
